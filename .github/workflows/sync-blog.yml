name: Sync Blog Mirror

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild blog mirror from source feed
        run: |
          mkdir -p blog
          python scripts/build_blog.py

      - name: Commit and push if mirror changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No blog changes to commit."
            exit 0
          fi
          git commit -m "chore(blog): sync mirror from blog.ph0.nexus"
          git push
